<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDP-Invoices · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<nav class="dash-nav">

  <!-- Brand (same logo as signin) -->
  <a href="/dashboard" class="logo dash-brand">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="1" width="10" height="13" rx="1.5" stroke="white" stroke-width="1.4"/>
        <path d="M5 5h4M5 7.5h4M5 10h2" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="13.5" cy="13.5" r="3" fill="#93C5FD" stroke="white" stroke-width="1"/>
        <path d="M12.5 13.5h2M13.5 12.5v2" stroke="white" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-name">IDP<span>-Invoices</span></span>
  </a>

  <!-- Downloads -->
  <div class="nav-item">
    <button class="nav-link" id="downloads-btn" onclick="toggleDropdown('downloads')">
      Downloads
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="dropdown" id="downloads-dropdown">
      <div class="dropdown-label">Latest licence</div>
      <a href="{{ url_for('latest_license') }}" class="dropdown-item">
        <div class="dropdown-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="1" width="9" height="12" rx="1.5" stroke="var(--blue)" stroke-width="1.3"/>
            <path d="M4.5 4.5h4M4.5 7h4M4.5 9.5h2" stroke="var(--blue)" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="dropdown-item-text">
          <div class="dropdown-item-title">Latest licence</div>
          <div class="dropdown-item-sub">Download your most recent licence</div>
        </div>
      </a>

      <div class="dropdown-divider"></div>
      <div class="dropdown-label">Application</div>

      <a href="/downloads/app" class="dropdown-item">
        <div class="dropdown-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke="var(--blue)" stroke-width="1.3"/>
            <path d="M5 8h6M8 5.5v5" stroke="var(--blue)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="dropdown-item-text">
          <div class="dropdown-item-title">IDP-Invoices App</div>
          <div class="dropdown-item-sub">Download the desktop application</div>
        </div>
      </a>
    </div>
  </div>

  <!-- Docs -->
  <a href="/docs" class="nav-link">Docs</a>

  <!-- Renew / Generate licence -->
  <a href="/licence" class="nav-link">Renew / Generate licence</a>

  <!-- Profile -->
  <div class="nav-item nav-profile">
    <button class="profile-btn" id="profile-btn" onclick="toggleDropdown('profile')">
      <div class="profile-avatar">D</div>
      <span class="profile-name">Dileep</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-left:2px;">
        <path d="M2 4l4 4 4-4" stroke="var(--ink-faint)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="dropdown profile-dropdown" id="profile-dropdown">
      <div class="plan-card">
        <div class="plan-card-title">Your Plan</div>
        <div class="plan-row">
          <span>Plan</span>
          <span class="plan-badge">Enterprise</span>
        </div>
        <div class="plan-row">
          <span>Invoices used</span>
          <strong>1,248 / 5,000</strong>
        </div>
        <div class="plan-row">
          <span>Renews</span>
          <strong>Aug 1, 2026</strong>
        </div>
        <div class="plan-row">
          <span>Status</span>
          <strong style="color:#059669;">Active</strong>
        </div>
      </div>

      <div class="dropdown-divider"></div>

      <a href="/account" class="dropdown-item">
        <div class="dropdown-item-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="5" r="2.5" stroke="var(--blue)" stroke-width="1.3"/>
            <path d="M2 13c0-2.5 2.5-4 5.5-4s5.5 1.5 5.5 4" stroke="var(--blue)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="dropdown-item-text">
          <div class="dropdown-item-title">Account settings</div>
        </div>
      </a>

      <div class="dropdown-divider"></div>

      <a href="/signout" class="dropdown-item logout-item">
        <div class="dropdown-item-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M6 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h3" stroke="#DC2626" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M10 10l3-3-3-3M13 7H6" stroke="#DC2626" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="dropdown-item-text">
          <div class="dropdown-item-title">Sign out</div>
        </div>
      </a>
    </div>
  </div>

</nav>

<script>
  let openDropdown = null;

  function toggleDropdown(name) {
    const dropdown = document.getElementById(name + '-dropdown');
    const btn      = document.getElementById(name + '-btn');
    const isOpen   = dropdown.classList.contains('open');

    closeAll();

    if (!isOpen) {
      dropdown.classList.add('open');
      btn.classList.add('active');
      openDropdown = name;
    }
  }

  function closeAll() {
    ['downloads', 'profile'].forEach(name => {
      const d = document.getElementById(name + '-dropdown');
      const b = document.getElementById(name + '-btn');
      if (d) { d.classList.remove('open'); }
      if (b) { b.classList.remove('active'); }
    });
    openDropdown = null;
  }

  // Close when clicking outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.nav-item')) {
      closeAll();
    }
  });
</script>

</body>
</html>
