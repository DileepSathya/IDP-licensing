<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDP-Invoices · Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<nav>
  <a href="#" class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="1" width="10" height="13" rx="1.5" stroke="white" stroke-width="1.4"/>
        <path d="M5 5h4M5 7.5h4M5 10h2" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="13.5" cy="13.5" r="3" fill="#93C5FD" stroke="white" stroke-width="1"/>
        <path d="M12.5 13.5h2M13.5 12.5v2" stroke="white" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-name">IDP<span>-Invoices</span></span>
  </a>
  <a href="/" class="action">Don't have an account? Sign up →</a>
</nav>

<main>
  <div class="form-card">
    <h1 class="form-title">Sign in to your account</h1>

    {% if error %}
    <div class="server-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signin">

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="alex@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button class="btn-primary" type="submit">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M2 8h12M9 4l5 4-5 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Sign in
      </button>

    </form>
  </div>
</main>

<footer>
  <span>© 2024 IDP-Invoices, Inc.</span>
  <div>
    <a href="#">Privacy</a>
    <a href="#">Security</a>
    <a href="#">Docs</a>
    <a href="#">Support</a>
  </div>
</footer>

</body>
</html>
